<!DOCTYPE html>
<html>
<head>
    <title>Links</title>
    <style>
        body.dark-mode {
            background-color: black;
            color: white;
        }
        /* Positions the black toggle in the top right */
        .top-right {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        /* Space for the discord section */
        .footer {
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="top-right">
        <button type="button" onclick="toggleDark()">black</button>
    </div>

    <p>offsets</p>

    <a href="https://raw.githubusercontent.com/idaapi/roblox-macos-offsets/refs/heads/main/version-73d88b9483b340ae.hpp">
        <button type="button">version-73d88b9483b340ae.hpp</button>
    </a>

    <a href="https://raw.githubusercontent.com/idaapi/roblox-macos-offsets/refs/heads/main/version-73d88b9483b340ae.json">
        <button type="button">version-73d88b9483b340ae.json</button>
    </a>

    <div class="footer">
        <a href="https://discord.gg/KfBcu9UJc" target="_blank">
            <button type="button">join my discord</button>
        </a>
    </div>

    <script>
        // Check for saved dark mode
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        function toggleDark() {
            document.body.classList.toggle('dark-mode');
            
            // Save preference
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        }
    </script>

</body>
</html>
