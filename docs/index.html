<!DOCTYPE html>
<html>
<head>
    <title>Links</title>
    <style>
        body.dark-mode {
            background-color: black;
            color: white;
        }
        /* Positions the container in the top right corner */
        .top-right {
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>

    <div class="top-right">
        <button type="button" onclick="toggleDark()">black</button>
    </div>

    <p>offsets</p>

    <a href="https://raw.githubusercontent.com/idaapi/main/version-73d88b9483b340ae.hpp">
        <button type="button">version-73d88b9483b340ae</button>
    </a>

    <a href="https://raw.githubusercontent.com/idaapi/main/version-73d88b9483b340ae.json">
        <button type="button">version-73d88b9483b340ae</button>
    </a>

    <script>
        // Load the saved preference on page load
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        function toggleDark() {
            document.body.classList.toggle('dark-mode');
            
            // Save the current state
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        }
    </script>

</body>
</html>
